# =============================================================================
# SLSA L1/L3 Provenance Attestation — Saba AgenticFlow
# Supply chain provenance for git-tagged releases
# =============================================================================

name: SLSA Provenance

on:
  push:
    tags:
      - 'v*'
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  attestations: write

concurrency:
  group: slsa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  provenance:
    name: Build & Attest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@1c608d11d69870c2092266b3f9a6f3abbf17002c
        with:
          subject-path: |
            README.md
            LICENSE
            docs/*.md
          subject-name: ${{ github.repository }}@${{ github.ref_name }}

      - name: Summary
        run: |
          echo "## 🔏 SLSA L1 Provenance - Saba AgenticFlow" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Build provenance attestation generated" >> $GITHUB_STEP_SUMMARY
          echo "✅ SLSA L1 compliance achieved" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
